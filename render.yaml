# Render Deployment Configuration
# IMPORTANT: In Render dashboard, leave "Root Directory" BLANK (empty)
# The repository root IS the project root
services:
  - type: web
    name: dukani-system
    env: node
    # Root Directory in Render settings should be: (leave blank)
    buildCommand: npm install && cd server && npm install && cd ../client && npm install && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 18
